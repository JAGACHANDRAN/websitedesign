<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Men’s Product Page</title>

  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      margin: 0;
      background-color: #f4f4f4;
      color: #222;
    }

    /* 🔝 Navigation Bar */
    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      background-color: #111;
      padding: 20px 0;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #ffcc00;
    }

    /* 🧱 Product Section */
    .product-section {
      max-width: 1200px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h2.section-title {
      text-align: center;
      font-size: 32px;
      margin-bottom: 30px;
      color: #333;
      text-decoration: underline;
    }

    /* 🎁 Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    /* 🛍️ Product Card */
    .product-card {
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      padding-bottom: 20px;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .product-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .product-card:hover img {
      transform: scale(1.05);
    }

    .product-card strong {
      display: block;
      margin-top: 10px;
      font-size: 18px;
      color: #222;
    }

    .product-card p {
      margin: 8px 0;
      font-size: 16px;
      color: #555;
    }

    /* 🛒 Buttons */
    .product-card button {
      background-color: #ffcc00;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      padding: 10px 25px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .product-card button:hover {
      background-color: #ff9900;
      transform: translateY(-2px);
    }

    hr {
      border: none;
      border-top: 2px solid #ccc;
      margin: 50px auto;
      width: 80%;
    }

    /* 📱 Responsive */
    @media (max-width: 768px) {
      nav {
        flex-wrap: wrap;
        gap: 20px;
      }
      .product-card img {
        height: 230px;
      }
    }
  </style>
</head>

<body>
  <div id="header"></div>

  <!-- Product Section 1 -->
  <section class="product-section">
    <h2 class="section-title">Men’s Collection</h2>

    <div class="product-grid">
      <div class="product-card">
        <img src="assets/images/nimble-made-N0ke5zChVBU-unsplash.jpg" alt="Formal Shirt">
        <strong>₹700</strong>
        <p>Product Item 1</p>
        <button>Buy Now</button>
      </div>

      <div class="product-card">
        <img src="assets/images/mohamad-khosravi-YP9DYK6j5cM-unsplash.jpg" alt="T-Shirt">
        <strong>₹900</strong>
        <p>Product Item 2</p>
        <button>Buy Now</button>
      </div>

      <div class="product-card">
        <img src="assets/images/mohamad-khosravi-OSS7Gd9whn8-unsplash.jpg" alt="Men's Shirt">
        <strong>₹800</strong>
        <p>Product Item 3</p>
        <button>Buy Now</button>
      </div>
    </div>

    <hr>

    <div class="product-grid">
      <div class="product-card">
        <img src="assets/images/rayul-_M6gy9oHgII-unsplash.jpg" alt="Men's Suit">
        <strong>₹1700</strong>
        <p>Product Item 4</p>
        <button>Buy Now</button>
      </div>

      <div class="product-card">
        <img src="assets/images/Hoodie social media post.jpg" alt="Men's Blazer">
        <strong>₹1900</strong>
        <p>Product Item 5</p>
        <button>Buy Now</button>
      </div>

      <div class="product-card">
        <img src="assets/images/T-Shirt Poster-3.jpg" alt="Coat">
        <strong>₹1800</strong>
        <p>Product Item 6</p>
        <button>Buy Now</button>
      </div>
    </div>
  </section>
  </section>

    <div id="footer"></div>
    <script src="assets/js/include.js"></script>
</body>
</html>
